name: 🏗️ Terraform Infrastructure

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra.yml'
  pull_request:
    branches: [main]
    paths:
      - 'infra/**'

env:
  TF_WORKING_DIR: infra
  AWS_REGION: eu-west-1

jobs:
  terraform-validate:
    name: 📋 Format, Validate & Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    services:
      localstack:
        image: localstack/localstack
        env:
          LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT: 1
        ports:
          - 4566:4566

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: 📐 Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: ⚙️ Terraform Init
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: eu-west-1
        run: terraform init

      - name: ✅ Terraform Validate
        run: terraform validate

      - name: 📝 Terraform Plan (LocalStack)
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: eu-west-1
        run: |
          terraform plan \
            -var="db_password=ci-test-password" \
            -var="project_name=data-archival-ci"

      - name: 🚀 Terraform Apply (LocalStack)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: eu-west-1
        run: |
          terraform apply -auto-approve -lock=false \
            -var="db_password=ci-test-password" \
            -var="project_name=data-archival-ci"

      - name: ✅ Verify S3 Bucket Created
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: eu-west-1
        run: |
          aws --endpoint-url=http://localhost:4566 s3 ls
          echo "✅ Infrastructure deployed to LocalStack successfully!"
