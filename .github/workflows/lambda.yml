name: ⚡ Lambda Deploy

on:
  push:
    branches: [main]
    paths:
      - 'lambda/**'
      - '.github/workflows/lambda.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lambda/**'

env:
  AWS_REGION: eu-north-1
  LAMBDA_FUNCTION_NAME: data-archival-archiver

jobs:
  # ── Step 1: Lint & Test ──────────────────────────────────
  lint-test:
    name: 🧹 Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lambda

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: 🧹 Lint with flake8
        run: flake8 handler.py --max-line-length=120

  # ── Step 2: Package & Deploy to Real AWS ──────────────────
  deploy:
    name: 🚀 Package & Deploy
    needs: lint-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: lambda

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 🔑 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 📦 Build deployment package
        run: |
          mkdir -p package
          pip install -r requirements.txt -t package/
          cp handler.py package/
          cd package
          zip -r ../lambda_deployment.zip .

      - name: 🚀 Deploy to AWS Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --zip-file fileb://lambda_deployment.zip \
            --region ${{ env.AWS_REGION }}
          echo "✅ Lambda deployed to AWS successfully!"

      - name: ✅ Verify Deployment
        run: |
          aws lambda get-function \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --query "Configuration.{Name:FunctionName,Runtime:Runtime,State:State,LastModified:LastModified}" \
            --output table

      - name: 💾 Upload Deployment Package
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: lambda/lambda_deployment.zip
          retention-days: 7
