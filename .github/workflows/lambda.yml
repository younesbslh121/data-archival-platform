name: ⚡ Lambda Deploy

on:
  push:
    branches: [main]
    paths:
      - 'lambda/**'
      - '.github/workflows/lambda.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lambda/**'

env:
  AWS_REGION: eu-west-1
  LAMBDA_FUNCTION_NAME: data-archival-archiver

jobs:
  # ── Step 1: Lint & Test ──────────────────────────────────
  lint-test:
    name: 🧹 Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lambda

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: 🧹 Lint with flake8
        run: flake8 handler.py --max-line-length=120

  # ── Step 2: Package & Deploy to LocalStack ───────────────
  deploy:
    name: 🚀 Package & Deploy
    needs: lint-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    defaults:
      run:
        working-directory: lambda

    services:
      localstack:
        image: localstack/localstack
        env:
          LOCALSTACK_ACKNOWLEDGE_ACCOUNT_REQUIREMENT: 1
        ports:
          - 4566:4566

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Install dependencies into package
        run: |
          mkdir -p package
          pip install -r requirements.txt -t package/
          cp handler.py package/

      - name: 🗜️ Create deployment package
        run: |
          cd package
          zip -r ../lambda_deployment.zip .

      - name: 🚀 Create Lambda on LocalStack
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: eu-west-1
        run: |
          # Create IAM role first
          aws --endpoint-url=http://localhost:4566 iam create-role \
            --role-name lambda-role \
            --assume-role-policy-document '{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"lambda.amazonaws.com"},"Action":"sts:AssumeRole"}]}'

          # Create the Lambda function
          aws --endpoint-url=http://localhost:4566 lambda create-function \
            --function-name ${{ env.LAMBDA_FUNCTION_NAME }} \
            --runtime python3.12 \
            --handler handler.lambda_handler \
            --role arn:aws:iam::000000000000:role/lambda-role \
            --zip-file fileb://lambda_deployment.zip

          echo "✅ Lambda deployed to LocalStack successfully!"

      - name: ✅ Verify Lambda Deployment
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: eu-west-1
        run: |
          aws --endpoint-url=http://localhost:4566 lambda list-functions \
            --query "Functions[?FunctionName=='${{ env.LAMBDA_FUNCTION_NAME }}'].{Name:FunctionName,Runtime:Runtime}" \
            --output table
          echo "✅ Lambda function verified!"

      - name: 💾 Upload Deployment Package
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package
          path: lambda/lambda_deployment.zip
          retention-days: 7
