# ═══════════════════════════════════════════════
# Data Archival Platform API — Configuration
# ═══════════════════════════════════════════════

server:
  port: 8081

spring:
  application:
    name: data-archival-api
  datasource:
    url: jdbc:postgresql://data-archival-postgres:5432/archival_db
    username: archival_admin
    password: password123

# ── AWS Configuration ──
aws:
  region: eu-west-1
  endpoint: http://localstack-main:4566

# ── Archival Settings ──
archival:
  s3:
    bucket-name: data-archival-storage-dev
  lambda:
    function-name: data-archival-archiver

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
