# ═══════════════════════════════════════════════
# Data Archival Platform API — Configuration
# ═══════════════════════════════════════════════

server:
  port: 8081

spring:
  application:
    name: data-archival-api
  datasource:
    url: jdbc:postgresql://${RDS_ENDPOINT:localhost:5432}/archival_db
    username: ${DB_USERNAME:archival_admin}
    password: ${DB_PASSWORD:password123}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

# ── AWS Configuration ──
aws:
  region: ${AWS_REGION:eu-north-1}

# ── Archival Settings ──
archival:
  s3:
    bucket-name: ${S3_BUCKET:data-archival-storage-dev}
  lambda:
    function-name: ${LAMBDA_FUNCTION_NAME:data-archival-archiver}

# ── Actuator ──
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
