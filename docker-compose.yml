version: "3.8"

# ═══════════════════════════════════════════════════════════
# Local Development Only — PostgreSQL for testing
# For real AWS deployment, use Terraform (infra/)
# ═══════════════════════════════════════════════════════════

services:
  postgres:
    image: postgres:15
    container_name: data-archival-postgres
    environment:
      POSTGRES_USER: archival_admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: archival_db
    ports:
      - "5436:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./lambda/db_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

volumes:
  postgres-data:
